  function escapeHtml(str) {

  function haptic(style) {
    try { if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style || 'light'); } catch (e) {}
  }

  function notify(msg) {
    haptic('medium');
    try {
      if (tg && tg.showAlert) tg.showAlert(msg);
      else if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      else alert(msg);
    } catch (e) {}
  }

  function syncBackButton() {

      else tg.BackButton.show();

      return '<div style="text-align: center; padding: 40px 20px; color: #aab2c0;">' +

      '<div onclick="go(\'home\')" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1;">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="' + homeColor + '"><rect x="3" y="3" width="7.5" height="7.5" rx="2.2"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="2.2"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="2.2"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2.2"/></svg>' +
        '<span style="font-size: 11px; font-weight: 600; color: ' + homeColor + ';">Главная</span>' +
      '</div>' +
      '<div onclick="go(\'today\')" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1;">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="3.5" stroke="' + todayColor + '" stroke-width="2"/><path d="M4 9h16M8 3v4M16 3v4" stroke="' + todayColor + '" stroke-width="2" stroke-linecap="round"/></svg>' +
        '<span style="font-size: 11px; font-weight: 600; color: ' + todayColor + ';">Сегодня</span>' +
      '</div>' +
      '<div onclick="go(\'exams\')" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1;">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 4 2 8l10 4 10-4z" stroke="' + examsColor + '" stroke-width="2" stroke-linejoin="round"/><path d="M6 11v4c0 1.8 2.7 3 6 3s6-1.2 6-3v-4" stroke="' + examsColor + '" stroke-width="2" stroke-linejoin="round"/></svg>' +
        '<span style="font-size: 11px; font-weight: 600; color: ' + examsColor + ';">Зачёты</span>' +
      '</div>' +
      '<div onclick="go(\'search\')" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1;">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="' + searchColor + '" stroke-width="2"/><path d="M16.5 16.5L21 21" stroke="' + searchColor + '" stroke-width="2" stroke-linecap="round"/></svg>' +
        '<span style="font-size: 11px; font-weight: 600; color: ' + searchColor + ';">Поиск</span>' +
      '</div>';
  }

  function render() {
    var s = state.screen;
    var sd = weekData[state.selectedDay] || weekData[0];

    document.getElementById('header-left').innerHTML = renderHeaderLeft();
    document.getElementById('header-title').textContent = s === 'day' ? sd.name : titles[s][0];
    document.getElementById('header-subtitle').textContent = titles[s][1];

    var html;
    if (s === 'home') html = renderHome();
    else if (s === 'today') html = renderToday();
    else if (s === 'week') html = renderWeek();
    else if (s === 'day') html = renderDay();
    else if (s === 'exams') html = renderExams();
    else html = renderSearch();
    document.getElementById('screen').innerHTML = html;

    document.getElementById('bottomnav').innerHTML = renderBottomNav();
  }

  document.addEventListener('DOMContentLoaded', function () {
    try {
      if (tg) {
        tg.ready();
        tg.expand();
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
        if (tg.BackButton) {
          tg.BackButton.onClick(back);
          syncBackButton();
        }
      }
    } catch (e) {}
    render();
  });
})();
</script>
</body>
</html>
